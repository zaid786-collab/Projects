<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="9.STYLE.css">
</head>
<body>

    <div id="main">

        <h1>CGPA Calculator</h1>

    <div class="form-group">

        <p><u><b>Theory Subjects :</b></u></p>
        
        <label for="mathes">&#8226; Enter Mathematics Marks : </label><br>
        <input type="number" min="0" step="0.01" id="gpa" id="mathes" name="mathesmarks"><br>

        <label for="electronics">&#8226; Enter Electronics Marks : </label><br>
        <input type="number" id="electronics" min="0" step="0.01" id="gpa" name="electronicsmarks"><br>

        <label for="mechanical">&#8226; Enter Mechanical Marks : </label><br>
        <input type="number" id="mechanical" min="0" step="0.01" id="gpa" name="mechanicalmarks"><br>

        <label for="dt">&#8226; Enter Design Thinking Marks : </label><br>
        <input type="number" min="0" step="0.01" id="gpa"  id="dt" name="dtsmarks"><br>

        <label for="ss">&#8226; Enter Soft Skills Marks : </label><br>
        <input type="number" min="0" step="0.01" id="gpa"  id="ss" name="ssmarks"><br>

        <label for="DSA">&#8226; Enter Data Structures Marks : </label><br>
        <input type="number" min="0" step="0.01" id="gpa" id="DSA" name="DSAmarks"><br>

        <p><u><b>Practical Subjects : </b></u></p>

        <label for="electronicslab">&#8226; Enter Electronics Lab Marks : </label><br>
        <input type="number" min="0" step="0.01" id="gpa"  id="electronicslab" name="electronicslabmarks"><br>

        <label for="mechanicallab">&#8226; Enter Mechanical Lab Marks : </label><br>
        <input type="number" min="0" step="0.01" id="gpa"  id="mechanicallab" name="mechanicallabmarks"><br>

        <label for="ssl">&#8226; Enter Soft Skills Lab Marks : </label><br>
        <input type="number" min="0" step="0.01" id="gpa" id="ssl" name="sslmarks"><br>

        <label for="DSAl">&#8226; Enter Data Structures Lab Marks : </label><br>
        <input type="number" min="0" step="0.01" id="gpa"  id="DSAl" name="DSAlmarks"><br>

        <label for="wb">&#8226; Enter Web Designing Lab Marks : </label><br>
        <input type="number" min="0" step="0.01" id="gpa" id="wb" name="wbmarks"><br>
    </div>

        <button>Calculate</button>
    </div>
</body>
</html>
